<!DOCTYPE html>
<html>
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <title>Videojuego con Javascript y HTML5</title>
    <link type="text/css" rel="stylesheet" href="css/main.css?14042012">
    <script src="js/videojuego-javascript.js?04042012" type="text/javascript"></script>
</head>
<body onload="game.init()">
    <div class="contenedor">
        <div class="izquierda">
                <img src="images/autentia.png" style="width: 250px; height: 100px;" />
            <ul class="lista">
                <li class="titulo">CONTROLES:</li>
                <li class="izquierda">izquierda</li>
                <li class="derecha">derecha</li>
                <li class="espacio">disparar</li>
            </ul>
            <ul class="lista">
                <li class="titulo">PROBADO CON:</li>
                <li class="firefox">Mozilla Firefox 11</li>
                <li class="chrome">Google Chrome 18</li>
                <li class="safari">Safari 5.1</li>
            </ul>
            <ul class="lista">
                <li class="titulo">OTROS:</li>
                <li><a>Tutorial</a></li>
                <li><a>Especificaciones del juego</a></li>
            </ul>
        </div>
        <div class="derecha">
            <h3 class="tituloPuntuaciones">MEJORES PUNTUACIONES</h3>
            <table id="puntuaciones">
                <thead>
                    <tr>
                        <th>Nombre</th>
                        <th>Fecha</th>
                        <th>Puntos</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
        <div class="juego">
            <div id="overlay" class="overlay">
                <div class="overlay-content">
                    <div id="startContent">
                        <h2>INGRESA TU NOMBRE</h2>
                        <input id="playerName" type="text" maxlength="12" placeholder="Tu nombre..." />
                        <button id="startButton">Jugar</button>
                    </div>
                    <div id="endContent" class="hidden">
                        <p id="finalText"></p>
                        <button id="restartButton">Volver a jugar</button>
                    </div>
                </div>
            </div>
            <canvas id="canvas" width="600" height="650">TU NAVEGADOR NO SOPORTA HTML5!</canvas>
        </div>

    </div>

</body>
</html>
